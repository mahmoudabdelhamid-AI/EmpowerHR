<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmpowerHR - التسجيل</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Registration Section -->
    <section class="registration-section" id="registrationSection">
        <div class="registration-container">
            <h2>سجل بياناتك</h2>
            
            <div class="profile-photo-upload">
                <div class="photo-placeholder">
                    📷
                    <div class="photo-overlay">اضغط لرفع صورة</div>
                </div>
                <input type="file" id="photoInput" style="display: none;" accept="image/*">
            </div>
            
            <form id="registrationForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">الاسم الأول</label>
                        <input type="text" id="firstName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="lastName">اسم العائلة</label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input
                    type="password"
                    id="password"
                    placeholder="أدخل كلمة المرور"
                    required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">تأكيد كلمة المرور</label>
                    <input
                    type="password"
                    id="confirmPassword"
                    placeholder="أعد إدخال كلمة المرور"
                    required>
                </div>
                
                <div class="form-group">
                    <label for="phone">رقم الهاتف</label>
                    <input type="tel" id="phone" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="city">المدينة</label>
                        <input type="text" id="city" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="birthDate">تاريخ الميلاد</label>
                        <input type="date" id="birthDate" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="specialization">التخصص / المجال</label>
                    <select id="specialization" required>
                        <option value="">اختر التخصص</option>
                        <option value="it">تكنولوجيا المعلومات</option>
                        <option value="design">التصميم الجرافيكي</option>
                        <option value="accounting">المحاسبة</option>
                        <option value="customer-service">خدمة العملاء</option>
                        <option value="marketing">التسويق</option>
                        <option value="other">أخرى</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="skills">المهارات</label>
                    <textarea id="skills" rows="3" placeholder="اذكر مهاراتك (مثال: Microsoft Office, التصميم، اللغات...)"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="accommodations">الاحتياجات الخاصة (اختياري)</label>
                    <textarea id="accommodations" rows="2" placeholder="أي تسهيلات قد تحتاجها في بيئة العمل"></textarea>
                </div>
                
                <button type="submit" class="submit-btn">إنشاء حساب</button>
            </form>
        </div>
    </section>

    <script src="assets/js/photoUpload.js"></script>
    <script type="module" src="assets/js/register.js"></script>
</body>
</html>
